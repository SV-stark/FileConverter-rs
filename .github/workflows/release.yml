name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry & Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Compile Workspace in Release Mode
        run: cargo build --release --workspace --locked

      - name: Cache NSIS Installation
        id: nsis-cache
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\NSIS
          key: nsis-${{ runner.os }}-3.10

      - name: Install NSIS Compiler
        if: steps.nsis-cache.outputs.cache-hit != 'true'
        run: choco install nsis --version=3.10 -y

      - name: Add NSIS to PATH
        run: |
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile NSIS Installer Setup
        run: makensis /V4 installer.nsi

      - name: Create Portable Zip Package
        run: |
          Compress-Archive `
            -Path "target\release\file_converter_bin.exe", "target\release\file_converter_shell.dll" `
            -DestinationPath "FileConverter_Portable.zip"

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FileConverter_Setup.exe
            FileConverter_Portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
