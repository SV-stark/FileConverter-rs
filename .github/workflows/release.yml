name: Build and Release Setup

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Compile Workspace in Release Mode
        run: cargo build --release --workspace

      - name: Create Portable Zip Package
        run: |
          Compress-Archive -Path "target\release\file_converter_bin.exe", "target\release\file_converter_shell.dll" -DestinationPath "FileConverter_Portable.zip"

      - name: Compile NSIS Installer Setup
        uses: joncloud/makensis-action@v4
        with:
          script-file: installer.nsi

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FileConverter_Setup.exe
            FileConverter_Portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
